{% extends 'base.html' %}

{% block title %}Tambah Laporan{% endblock %}

{% block content %}
<div class="card mx-auto" style="max-width:700px;">
    <div class="card-body">

        <h2 class="text-center mb-4">➕ Tambah Laporan</h2>

        <form method="POST" onsubmit="loadingSubmit(this)">
            {% csrf_token %}
            {{ form.as_p }}

            <button id="submitBtn" class="btn btn-success w-100">
                Simpan Laporan
            </button>
        </form>

        <a href="{% url 'report_list' %}" class="btn btn-secondary mt-3 w-100">
            ⬅ Kembali ke Daftar
        </a>

    </div>
</div>

<script>
function loadingSubmit(form) {
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Loading...";
}
</script>
{% endblock %}
