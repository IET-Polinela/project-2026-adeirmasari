{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<style>
    .home-box {
        background: white;
        padding: 40px;
        max-width: 700px;
        margin: 80px auto;
        text-align: center;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .home-box h1 {
        color: #2c3e50;
        margin-bottom: 15px;
    }

    .home-box a {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 24px;
        background-color: #3498db;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .home-box a:hover {
        background-color: #2c80b4;
    }
</style>

<div class="home-box">
    <h1>Selamat Datang di Kota Lampung Utara</h1>
    <h1>Kami Siap Melayani Anda</h1>

    <a href="{% url 'report_list' %}">
        Lihat Data Laporan
    </a>
</div>
{% endblock %}
