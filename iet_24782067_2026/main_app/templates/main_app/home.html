<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            width: 60%;
            max-width: 600px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background-color: #2c80b4;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Selamat Datang di Kota Lampung Utara</h1>
        <h1>Kami Siap Melayani Anda</h1>

        <a href="{% url 'report_list' %}">Lihat Data Laporan</a>
    </div>

</body>
</html>
