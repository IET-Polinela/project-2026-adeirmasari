<h2>Daftar Laporan</h2>

<a href="{% url 'add_report' %}">Tambah Laporan</a>

<table border="1">
    <tr>
        <th>Judul</th>
        <th>Isi</th>
        <th>Aksi</th>
    </tr>

    {% for report in reports %}
    <tr>
        <td>{{ report.title }}</td>
        <td>{{ report.description }}</td>
        <td>
            <a href="{% url 'update_report' report.id %}">Edit</a>
            <a href="{% url 'delete_report' report.id %}">Hapus</a>
        </td>
    </tr>
    {% endfor %}
</table>
