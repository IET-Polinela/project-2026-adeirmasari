{% extends 'base.html' %}

{% block title %}Edit Laporan{% endblock %}
{% block breadcrumb %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="/">Home</a>
        </li>
        <li class="breadcrumb-item">
            <a href="{% url 'report_list' %}">Reports</a>
        </li>
        <li class="breadcrumb-item active">
            Update Reports
        </li>
    </ol>
</nav>
{% endblock %}

{% block content %}
<div class="card mx-auto" style="max-width:700px;">
    <div class="card-body">

        <h2 class="text-center mb-4">✏ Edit Laporan</h2>

        <form method="POST" onsubmit="showLoading(this)">
            {% csrf_token %}
            {{ form.as_p }}

            <button id="updateBtn" class="btn btn-warning w-100">
                <span>Update Laporan</span>
                <span class="spinner-border spinner-border-sm ms-2 d-none"></span>
            </button>
        </form>

        <a href="{% url 'report_list' %}" class="btn btn-secondary mt-3 w-100">
            ⬅ Kembali ke Daftar
        </a>

    </div>
</div>

<script>
function showLoading(form) {
    const btn = form.querySelector("button");
    const spinner = form.querySelector(".spinner-border");

    btn.disabled = true;
    spinner.classList.remove("d-none");
}
</script>
{% endblock %}
