{% extends 'base.html' %}

{% block title %}Edit Laporan{% endblock %}

{% block content %}
<div class="card mx-auto" style="max-width:700px;">
    <div class="card-body">

        <h2 class="text-center mb-4">✏ Edit Laporan</h2>

        <form method="POST" onsubmit="loadingUpdate(this)">
            {% csrf_token %}
            {{ form.as_p }}

            <button id="updateBtn" class="btn btn-warning w-100">
                Update Laporan
            </button>
        </form>

        <a href="{% url 'report_list' %}" class="btn btn-secondary mt-3 w-100">
            ⬅ Kembali ke Daftar
        </a>

    </div>
</div>

<script>
function loadingUpdate(form) {
    const btn = document.getElementById("updateBtn");
    btn.disabled = true;
    btn.innerText = "Loading...";
}
</script>
{% endblock %}
