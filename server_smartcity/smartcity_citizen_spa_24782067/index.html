<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portal Warga - Smart City Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    :root {
        --green-primary: #198754;
        --green-dark: #146c43;
        --green-light: #d1e7dd;
        --green-soft: #f1f8f4;
    }

    body {
        background-color: #f4f8f5;
    }

    .spa-container {
        min-height: calc(100vh - 80px);
    }

    /* Navbar */
    .navbar.bg-primary {
        background-color: var(--green-primary) !important;
    }

    /* Semua elemen Bootstrap Primary */
    .bg-primary {
        background-color: var(--green-primary) !important;
    }

    .text-primary {
        color: var(--green-primary) !important;
    }

    /* Tombol */
    .btn-primary {
        background-color: var(--green-primary) !important;
        border-color: var(--green-primary) !important;
    }

    .btn-primary:hover {
        background-color: var(--green-dark) !important;
        border-color: var(--green-dark) !important;
    }

    .btn-outline-primary {
        color: var(--green-primary) !important;
        border-color: var(--green-primary) !important;
    }

    .btn-outline-primary:hover {
        background-color: var(--green-primary) !important;
        border-color: var(--green-primary) !important;
        color: white !important;
    }

    /* Badge */
    .badge.bg-primary {
        background-color: var(--green-primary) !important;
    }

    /* Progress Bar */
    .progress-bar.bg-primary {
        background-color: var(--green-primary) !important;
    }

    /* Alert JWT */
    .alert-success {
        background-color: var(--green-light) !important;
        border-color: #b7d8c7 !important;
        color: #0f5132 !important;
    }

    /* Modal Header */
    .modal-header.bg-primary {
        background-color: var(--green-primary) !important;
    }

    /* Input Focus */
    .form-control:focus,
    .form-select:focus,
    textarea:focus {
        border-color: var(--green-primary);
        box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
    }

    /* Card */
    .card {
        border-radius: 16px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-thumb {
        background: #9fc5aa;
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--green-primary);
    }
</style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">

            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>
                Smart City Portal
            </a>

            <div id="nav-menu" class="ms-auto"></div>

        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container"
          id="app-content">
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>

    <!-- Modal Laporan -->
<div class="modal fade" id="reportModal" tabindex="-1"
     aria-labelledby="reportModalLabel" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 shadow">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title fw-bold" id="reportModalLabel">
                    <i class="bi bi-pencil-square me-2"></i>
                    Buat Laporan Baru
                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"
                        aria-label="Close">
                </button>

            </div>

            <div class="modal-body p-4">

                <form id="reportForm">

                    <!-- Judul -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Judul Laporan
                        </label>
                        <input type="text"
                               id="title"
                               class="form-control"
                               required>
                    </div>

                    <!-- Kategori -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Kategori
                        </label>
                        <select id="category"
                                class="form-select"
                                required>
                            <option value="">Pilih Kategori</option>
                            <option value="Jalan Rusak">Jalan Rusak</option>
                            <option value="Drainase">Drainase</option>
                            <option value="Sampah">Sampah</option>
                            <option value="Lampu Jalan">Lampu Jalan</option>
                        </select>
                    </div>

                    <!-- Lokasi -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Lokasi
                        </label>
                        <input type="text"
                               id="location"
                               class="form-control"
                               required>
                    </div>

                    <!-- Deskripsi -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            Deskripsi
                        </label>
                        <textarea id="description"
                                  class="form-control"
                                  rows="4"
                                  required></textarea>
                    </div>

                    <div class="d-flex justify-content-between mt-4">

                        <button type="button"
                                class="btn btn-outline-secondary fw-bold px-4"
                                id="btnDraft">
                            Simpan Draft
                        </button>

                        <button type="button"
                                class="btn btn-primary fw-bold px-4"
                                id="btnSubmit">
                            Ajukan
                            <i class="bi bi-send-fill ms-1"></i>
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
</body>
</html>
