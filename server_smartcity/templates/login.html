{% extends 'base.html' %}

{% block title %}Login | LAMPURA SIKEP{% endblock %}

{% block content %}
<style>
    .auth-glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        padding: 40px;
        margin-top: 50px;
    }
    .btn-login {
        background: linear-gradient(45deg, #1e8449, #2ecc71);
        border: none;
        border-radius: 50px;
        font-weight: bold;
        padding: 12px;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="auth-glass-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold" style="color: #1a3c34;">Masuk Ke Sistem</h3>
                <p class="text-muted small">Gunakan akun Anda</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-success"></i></span>
                        <input type="text" name="username" class="form-control border-start-0" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-success"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login btn-primary w-100 shadow">
                    Masuk Sekarang <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="small">Belum punya akun? <a href="{% url 'register' %}" class="text-success fw-bold text-decoration-none">Daftar di sini</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
